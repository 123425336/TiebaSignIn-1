# 每天6:30执行

name: Start

on:
   push:
   gollum:
   schedule:
       - cron: '0 16 * * *'

jobs:
  signin:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 授予写入权限以支持保活工作流的推送喵

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'
          cache: 'maven'  # 使用官方推荐的 Maven 依赖缓存

      - name: Build and execute
        env:
          BDUSS: ${{ secrets.BDUSS }}
          SCKEY: ${{ secrets.SCKEY }}
          TID: ${{ secrets.TID }}
          CONTENT: ${{ secrets.CONTENT }}
        run: |
          mvn -B clean compile exec:java \
            -Dexec.mainClass="top.srcrs.Run" \
            -Dexec.args="$BDUSS $SCKEY"

      - name: Keepalive Workflow (Bash)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 每周日进行一次虚拟提交保活，既能防Action暂停又能保持提交历史干净喵
          if [ "$(date +%u)" -eq 7 ]; then
            echo "周日保活推送中喵~"
            date > keepalive.txt
            git add keepalive.txt
            git commit -m "chore: keepalive push [skip ci]喵"
            git push
          fi
